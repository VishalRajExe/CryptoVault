spring.application.name=trading-plateform

server.port=5454

spring.datasource.url=jdbc:mysql://localhost:3306/crypto_trading_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL
spring.mail.password=YOUR_EMAIL_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Stripe
stripe.api.key=YOUR_STRIPE_API_KEY

# Razorpay
razorpay.api.key=YOUR_RAZORPAY_API_KEY
razorpay.api.secret=YOUR_RAZORPAY_API_SECRET

# CoinGecko
coingecko.api.key=YOUR_COINGECKO_API_KEY

# Gemini
gemini.api.key=YOUR_GEMINI_API_KEY

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET

# Frontend
app.frontend.url=http://localhost:5173